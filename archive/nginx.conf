# Sentinel nginx configuration
# Serves static frontend + reverse proxies API to FastAPI backend

server {
    listen 80;
    server_name _;

    # For Let's Encrypt certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Vitruvian image (explicit for the body map)
    location = /vitruvian.jpg {
        root /usr/share/nginx/html;
    }

    # API requests → FastAPI backend
    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

